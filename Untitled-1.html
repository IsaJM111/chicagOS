<!-- CALCULATOR APP WINDOW -->
    <div id="calculator" class="window" style="display: none; width: 300px">
      <div class="header" id="calculatorheader"> 
        <h1>Calculator</h1>
        <p class="close-button"; id="calculatorClose" style="backdrop-filter: blur(20px)">X</p>
      </div>
      <div class="calculator-display" id="calculatorDisplay">0</div>
      <div class="calculator-buttons">
        <button class="calc-button clear-button" onclick="clearCalculator()">AC</button>
        <button class="calc-button operator-button" onclick="deleteCalculator()">⌫</button>
        <button class="calc-button operator-button"  onclick="calculator('%')">%</button>
        <button class="calc-button operator-button" onclick="calculator('/')">÷</button>
        <button class="calc-button" onclick="calculator('7')">7</button>
        <button class="calc-button" onclick="calculator('8')">8</button>
        <button class="calc-button" onclick="calculator('9')">9</button>
        <button class="calc-button operator-button" onclick="calculator('*')">X</button>
        <button class="calc-button" onclick="calculator('4')">4</button>
        <button class="calc-button" onclick="calculator('5')">5</button>
        <button class="calc-button" onclick="calculator('6')">6</button>
        <button class="calc-button operator-button" onclick="calculator('-')">-</button>
        <button class="calc-button" onclick="calculator('1')">1</button>
        <button class="calc-button" onclick="calculator('2')">2</button>
        <button class="calc-button" onclick="calculator('3')">3</button>
        <button class="calc-button operator-button" onclick="calculator('+')">+</button>
        <button class="calc-button zero-button" onclick="calculator('0')">0</button>
        <button class="calc-button" onclick="calculator('.')">.</button>
        <button class="calc-button equals-button" onclick="calculate()">=</button>
      </div>
    </div>
<!-- GALLERY APP WINDOW -->
     <div id="gallery" class="window" style="display: none">

        <img id="galleryImage" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCM_d9SQ56xa8ccPT63FoBy0Jec32p7TRisgVzN3A0Qg&s=10" alt="Gallery photo">
        <div class="galleryControls">
          <button onclick="previousPhoto()">←</button>
          <span id="galleryNumber">1 / 13</span>
          <button onclick="nextPhoto()">→</button>
        </div>
       </div>
    </div>
